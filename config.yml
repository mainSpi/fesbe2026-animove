# -----------------------------------------------------------------------------
# Links
#   icon  — Font Awesome class (https://fontawesome.com/search?o=r&m=free)
#   text  — displayed text (Liquid + HTML allowed)
#   title — link title attribute
#   url   — destination
#   alt   — accessibility text
#   target — `_blank` (new tab) or `_self`
# -----------------------------------------------------------------------------
links:
